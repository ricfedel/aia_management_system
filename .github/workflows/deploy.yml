name: Build & Deploy

# Trigger: ogni push su main oppure manualmente dalla UI GitHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Sostituire con il tuo username GitHub (minuscolo)
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/aia-backend
  IMAGE_NGINX:   ghcr.io/${{ github.repository_owner }}/aia-nginx

jobs:

  # ── Job 1: Build e push immagini Docker ─────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessario per push su ghcr.io

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # automatico, non serve configurarlo

      - name: Setup Docker Buildx (build multi-platform e cache)
        uses: docker/setup-buildx-action@v3

      # ── Backend Spring Boot ──────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          # Cache layer tra i build successivi (più veloce dal secondo build in poi)
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Nginx + Frontend Angular ─────────────────────────────────────────────
      - name: Build & push nginx+frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NGINX }}:latest
            ${{ env.IMAGE_NGINX }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 2: Deploy sul VPS ────────────────────────────────────────────────────
  deploy:
    name: Deploy su VPS
    runs-on: ubuntu-latest
    needs: build   # parte solo se il build è andato a buon fine
    environment: production   # abilita le approval manuali opzionali su GitHub

    steps:
      - name: Checkout (per docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copia docker-compose.yml sul VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   docker-compose.yml
          target:   /opt/aia

      - name: Deploy (pull nuove immagini e riavvio)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/aia

            # Login al registry per poter fare pull delle immagini private
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Aggiorna le variabili di immagine nel compose con i tag della commit
            export IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            export IMAGE_NGINX=${{ env.IMAGE_NGINX }}:${{ github.sha }}

            # Pull delle nuove immagini
            docker compose pull

            # Riavvio a zero downtime (--no-deps per non toccare i volumi)
            docker compose up -d --remove-orphans

            # Pulizia immagini vecchie (libera spazio sul disco)
            docker image prune -f

            echo "✅ Deploy completato: ${{ github.sha }}"
