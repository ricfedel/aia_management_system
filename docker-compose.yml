# ─────────────────────────────────────────────────────────────────────────────
# AIA Management System — Docker Compose
#
# Servizi:
#   nginx    → reverse proxy + serve Angular (porta 80/443)
#   backend  → Spring Boot (non esposto direttamente, solo raggiungibile da nginx)
#
# Avvio rapido:
#   cp .env.example .env          # copia e compila le variabili
#   docker compose up --build -d  # build e avvio
#   docker compose logs -f        # segui i log
#
# Note sicurezza:
#   - Il backend NON è esposto su porte pubbliche (nessun ports: sul servizio backend)
#   - X-Internal-Token viene strippato da Nginx (vedere nginx/nginx.conf)
#   - I segreti vengono passati solo via variabili d'ambiente (mai hardcoded)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aia_management
      POSTGRES_USER: ${DB_USERNAME:-aia}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - aia-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - aia-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aia} -d aia_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    # In produzione (VPS) usa l'immagine dal registry, sovrascritta da GitHub Actions.
    # In sviluppo locale usa: docker compose up --build
    image: ${IMAGE_BACKEND:-aia-backend-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aia-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      # Segreto interno BPM (deve corrispondere a quello in .env)
      # Nginx lo stripa dalle richieste esterne (proxy_set_header X-Internal-Token "")
      AIA_INTERNAL_SECRET: ${AIA_INTERNAL_SECRET}

      # Database PostgreSQL
      DATABASE_URL: jdbc:postgresql://db:5432/aia_management
      DATABASE_USERNAME: ${DB_USERNAME:-aia}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # Upload
      FILE_UPLOAD_DIR: /app/uploads

      # Email (opzionale)
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-false}
      NOTIFICATIONS_DEFAULT_RECIPIENT: ${NOTIFICATIONS_DEFAULT_RECIPIENT:-admin@grandimolini.it}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}

    volumes:
      # Documenti caricati (upload AIA)
      - aia-uploads:/app/uploads

    # Il backend NON è esposto direttamente su porte pubbliche.
    # È raggiungibile solo da nginx tramite la rete interna Docker.
    expose:
      - "8080"

    networks:
      - aia-internal

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # Spring Boot impiega ~15-30s, 90s di margine sufficiente

  # ── Nginx (reverse proxy + frontend Angular) ────────────────────────────────
  nginx:
    image: ${IMAGE_NGINX:-aia-nginx-local}
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: aia-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # nginx.conf è già incluso nell'immagine (COPY nel Dockerfile).
      # In produzione non serve montarlo — l'immagine pre-built ha già la config.
      # Certificati SSL (Let's Encrypt / certbot)
      - aia-certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aia-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volumi persistenti ─────────────────────────────────────────────────────────
volumes:
  aia-db-data:    # dati PostgreSQL persistenti
    driver: local
  aia-uploads:
    driver: local
  aia-certs:
    driver: local

# ── Rete interna (backend non raggiungibile dall'esterno) ──────────────────────
networks:
  aia-internal:
    driver: bridge
