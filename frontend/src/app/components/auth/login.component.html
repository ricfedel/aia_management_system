<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>AIA Management System</h1>
      <p>Sistema di Gestione Autorizzazioni Integrate Ambientali</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          class="form-control"
          formControlName="username"
          [class.is-invalid]="submitted && f['username'].errors"
          placeholder="Inserisci il tuo username"
          autocomplete="username"
        />
        <div *ngIf="submitted && f['username'].errors" class="invalid-feedback">
          Username è obbligatorio
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          [class.is-invalid]="submitted && f['password'].errors"
          placeholder="Inserisci la tua password"
          autocomplete="current-password"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          Password è obbligatoria
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Accedi</span>
        <span *ngIf="loading">Accesso in corso...</span>
      </button>

      <div class="login-footer">
        <p>Credenziali di default: <strong>admin</strong> / <strong>Admin&#64;123456</strong></p>
        <p class="text-muted">Per la prima installazione</p>
      </div>
    </form>
  </div>
</div>
