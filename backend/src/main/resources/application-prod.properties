# ===============================================
# PRODUCTION PROFILE - PostgreSQL Database
# ===============================================

# PostgreSQL Database Configuration
# IMPORTANTE: Configurare con variabili d'ambiente in produzione
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aia_management}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driverClassName=org.postgresql.Driver

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway/Liquibase (se utilizzati per migration)
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# Logging - Ridotto per produzione
logging.level.it.grandimolini.aia=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# JWT - OBBLIGATORIO configurare con variabili d'ambiente
# ATTENZIONE: La secret DEVE essere almeno 32 caratteri e UNICA per produzione
app.jwt.secret=${JWT_SECRET:CHANGE-THIS-SECRET-IN-PRODUCTION-REQUIRED-32-CHARS-MINIMUM}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Internal API secret — OBBLIGATORIO in produzione
# Generare con: openssl rand -hex 32
# Nginx DEVE strippare questo header: proxy_set_header X-Internal-Token "";
app.internal.secret=${AIA_INTERNAL_SECRET:CHANGE-THIS-INTERNAL-SECRET-IN-PRODUCTION}

# File Storage - Path assoluto in produzione
file.upload.dir=${FILE_UPLOAD_DIR:/var/aia-management/uploads}
file.upload.max-size=52428800

# Notifiche Email - Configurare con variabili d'ambiente
aia.notifications.enabled=${NOTIFICATIONS_ENABLED:false}
aia.notifications.default-recipient=${NOTIFICATIONS_DEFAULT_RECIPIENT:admin@grandimolini.it}

# SMTP Configuration (se notifiche abilitate)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${SMTP_FROM:noreply@grandimolini.it}

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Actuator (per monitoring) - Proteggere con Spring Security
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# Disabilita health indicator mail: SMTP non configurato in prod causa HTTP 500
management.health.mail.enabled=false
