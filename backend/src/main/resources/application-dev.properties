# ===============================================
# DEVELOPMENT PROFILE - PostgreSQL locale
# DB: aia | User: aia | Password: aia
# ===============================================

# PostgreSQL locale
spring.datasource.url=jdbc:postgresql://localhost:5432/aia
spring.datasource.username=postgres
spring.datasource.password=Leon2203!
spring.datasource.driverClassName=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update': Hibernate crea le tabelle mancanti al primo avvio e le aggiorna
# se cambiano le entity (senza mai cancellare dati esistenti)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - Verbose per sviluppo
logging.level.it.grandimolini.aia=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT - Secret per sviluppo (NON usare in produzione)
app.jwt.secret=dev-secret-key-for-development-only-min-32-chars-long
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Storage
file.upload.dir=uploads
file.upload.max-size=52428800

# Notifiche Email - Disabilitate in dev
aia.notifications.enabled=false
aia.notifications.default-recipient=admin@grandimolini.it
