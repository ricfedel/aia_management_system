# ===============================================
# DEVELOPMENT PROFILE - H2 In-Memory Database
# ===============================================

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:aiadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (per debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Esegui data.sql DOPO che Hibernate ha creato lo schema (necessario con ddl-auto=create-drop)
spring.jpa.defer-datasource-initialization=true

# Logging - Verbose per sviluppo
logging.level.it.grandimolini.aia=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT - Secret per sviluppo (NON usare in produzione)
app.jwt.secret=dev-secret-key-for-development-only-min-32-chars-long
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Storage
file.upload.dir=uploads
file.upload.max-size=52428800

# Notifiche Email - Disabilitate in dev
aia.notifications.enabled=false
aia.notifications.default-recipient=admin@grandimolini.it
