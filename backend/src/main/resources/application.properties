# ===============================================
# AIA MANAGEMENT SYSTEM - Main Configuration
# ===============================================
# Sistema di Gestione AIA - Grandi Molini Italiani
#
# PROFILI DISPONIBILI:
# - dev  : Sviluppo con H2 in-memory (default)
# - prod : Produzione con PostgreSQL
#
# Per attivare un profilo:
# - CLI: java -jar app.jar --spring.profiles.active=prod
# - Env: SPRING_PROFILES_ACTIVE=prod
# ===============================================

# Application
spring.application.name=AIA Management System

# Profilo attivo (default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${SERVER_PORT:8080}

# CORS Configuration (centralizzato in SecurityConfig)
# Per modificare origini consentite, editare SecurityConfig.java

# JWT Configuration (sovrascritta dai profili)
app.jwt.secret=override-in-profile-specific-properties
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Internal API secret — usato dal motore BPM per chiamate self-API senza JWT.
# In produzione sovrascrivere tramite variabile d'ambiente AIA_INTERNAL_SECRET
# oppure nel profilo application-prod.properties.
# NGINX deve strippare questo header dalle richieste esterne:
#   proxy_set_header X-Internal-Token "";
app.internal.secret=${AIA_INTERNAL_SECRET:dev-internal-secret-change-in-prod}

# File Storage Configuration (sovrascritta dai profili)
file.upload.dir=uploads
file.upload.max-size=52428800

# Email Configuration (sovrascritta dai profili)
aia.notifications.enabled=false
aia.notifications.default-recipient=admin@grandimolini.it

# Logging base
logging.level.root=INFO

# ─── Estrazione documenti (OCR + AI) ──────────────────────────────────────────
# L'estrazione regex/PDFBox è sempre attiva.
# Per abilitare l'arricchimento AI (Anthropic Claude):
#   1. Imposta aia.estrazione.ai.enabled=true
#   2. Fornisci la chiave API tramite variabile d'ambiente ANTHROPIC_API_KEY
#      oppure direttamente in application-dev.properties (NON committare la chiave)
aia.estrazione.ai.enabled=${AIA_ESTRAZIONE_AI_ENABLED:false}
aia.estrazione.ai.api-key=${ANTHROPIC_API_KEY:}
aia.estrazione.ai.model=${AIA_ESTRAZIONE_AI_MODEL:claude-haiku-4-5-20251001}
