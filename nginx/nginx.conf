# ─────────────────────────────────────────────────────────────────────────────
# Nginx — AIA Management System
#
# Architettura:
#   Internet → Nginx (:80/:443) → Spring Boot (:8080)
#                              → Angular static files
#
# Sicurezza API interne (LocalhostInternalAuthFilter):
#   L'header X-Internal-Token viene RIMOSSO da tutte le richieste in ingresso
#   per impedire che client esterni possano impersonare chiamate BPM interne.
#   Solo le chiamate originate da Spring Boot stesso (self-call) aggiungono
#   questo header direttamente verso il container backend, bypassando Nginx.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format esteso con tempi di risposta
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 60M;  # Upload documenti AIA (max configurato: 52MB)

    # ── Compressione gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── Upstream Spring Boot ──────────────────────────────────────────────────
    upstream springboot {
        server backend:8080;
        keepalive 32;
    }

    # ── Server HTTP → redirect HTTPS (in produzione con SSL) ─────────────────
    # Commentato di default; decommentare quando si configura SSL con certbot.
    #
    # server {
    #     listen 80;
    #     server_name tuodominio.it;
    #     return 301 https://$host$request_uri;
    # }

    # ── Server principale ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;  # Risponde a qualsiasi hostname; in prod: tuodominio.it

        # Radice per i file statici Angular
        root /usr/share/nginx/html;
        index index.html;

        # ── Headers di sicurezza ──────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API Spring Boot ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://springboot;
            proxy_http_version 1.1;

            # Header standard di proxy
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # ── SICUREZZA CRITICA ─────────────────────────────────────────────
            # Rimuove l'header segreto usato dal BPM engine per le self-call.
            # Senza questa riga un client esterno potrebbe impostare l'header
            # manualmente e bypassare l'autenticazione JWT.
            # Vedere: LocalhostInternalAuthFilter.java
            proxy_set_header   X-Internal-Token  "";

            # Timeout generosi per elaborazioni lunghe (analisi OCR, generazione PDF)
            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;
        }

        # ── Upload file (timeout esteso) ──────────────────────────────────────
        location /api/documenti/upload {
            proxy_pass         http://springboot;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Internal-Token  "";  # Strip anche qui
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            client_max_body_size 60M;
        }

        # ── Frontend Angular (SPA) ────────────────────────────────────────────
        # Serve i file statici; redirige qualsiasi route non trovata a index.html
        # per permettere al router Angular di gestirla lato client.
        location / {
            try_files $uri $uri/ /index.html;

            # Cache aggressiva per assets con hash nel nome (Angular build)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Health check Nginx (per load balancer / Docker healthcheck) ───────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS (decommentare e configurare con certbot) ────────────────────────
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name tuodominio.it;
    #
    #     ssl_certificate     /etc/letsencrypt/live/tuodominio.it/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/tuodominio.it/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... stesso blocco location di sopra ...
    # }
}
